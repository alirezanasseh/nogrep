name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view nogrep version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version bump detected: $PUBLISHED → $LOCAL"
          fi

      - if: steps.version.outputs.changed == 'true'
        run: npm ci

      - if: steps.version.outputs.changed == 'true'
        run: npm run build

      - if: steps.version.outputs.changed == 'true'
        run: npm test

      - if: steps.version.outputs.changed == 'true'
        run: npm publish
